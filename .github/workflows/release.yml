name: Release Binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      with_llm:
        description: "Include OpenAI + Anthropic SDKs"
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: lattice-linux-x86_64
            binary: dist/lattice
          - os: macos-latest
            artifact: lattice-macos-arm64
            binary: dist/lattice
          - os: windows-latest
            artifact: lattice-windows-x86_64
            binary: dist/lattice.exe

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.artifact }})

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -e ".[llm]"

      - name: Build binary
        run: |
          pyinstaller release/lattice.spec \
            --distpath dist \
            --workpath build \
            --noconfirm \
            --clean
        shell: bash

      - name: Verify binary
        run: |
          ${{ matrix.binary }} --help
        shell: bash

      - name: Package artifact
        run: |
          mkdir -p release-out
          cp ${{ matrix.binary }} release-out/
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release-out/

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          for dir in artifacts/*/; do
            name=$(basename "$dir")
            if [[ "$name" == *windows* ]]; then
              (cd "$dir" && zip "../../release-assets/${name}.zip" *)
            else
              chmod +x "$dir"/*
              (cd "$dir" && tar czf "../../release-assets/${name}.tar.gz" *)
            fi
          done
          ls -lh release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*
